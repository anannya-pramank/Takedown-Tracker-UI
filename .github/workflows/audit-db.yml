name: Audit database

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install psycopg2-binary
      - env:
          SUPABASE_DB_PW: ${{ secrets.SUPABASE_DB_PW }}
        run: python audit_db.py
      - uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: audit.json
