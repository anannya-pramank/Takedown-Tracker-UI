name: Inspect database schema

# Manual trigger only — click "Run workflow" in the Actions tab.
on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install psycopg2-binary

      - name: Run inspection
        env:
          SUPABASE_DB_PW: ${{ secrets.SUPABASE_DB_PW }}
        run: python inspect_db.py
