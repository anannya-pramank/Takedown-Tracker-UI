<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Content-blocking tracker</title>
<style>
  :root{
    --ink:#1a1a18;
    --ink-soft:#56544e;
    --ink-faint:#8a877f;
    --paper:#ffffff;
    --surface:#f6f4ef;
    --line:#e3e0d8;
    --line-strong:#cbc7bd;
    --accent:#1f5a8a;
    --accent-soft:#e7eef5;
    --grid-empty:#d9d5cb;
    --grid-match:#1f5a8a;
    --grid-hover:#e0a32e;
    --card-bg:#3a3935;
    --radius:10px;
    --serif:Georgia,"Times New Roman",serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.6;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:1040px;margin:0 auto;padding:40px 28px 64px;}

  .header{display:grid;grid-template-columns:1.15fr 1fr;gap:44px;align-items:start;}
  .headline{font-family:var(--serif);font-weight:700;font-size:clamp(40px,6.6vw,72px);line-height:1.04;letter-spacing:-0.015em;margin:0;}
  .headline .hl{position:relative;display:inline-block;color:var(--ink);}
  .headline .hl .hl-t{position:relative;z-index:1;}
  .headline .hl .hl-mark{position:absolute;z-index:0;left:-0.14em;top:-0.02em;
    width:calc(100% + 0.28em);height:106%;
    clip-path:inset(0 100% 0 0);transform-origin:center;
    transition:transform .28s cubic-bezier(.2,.7,.2,1);
    animation:hl-unfurl .85s cubic-bezier(.2,.75,.2,1) .45s forwards;}
  .headline .hl:hover .hl-mark{transform:scale(1.16);}
  @keyframes hl-unfurl{from{clip-path:inset(0 100% 0 0);}to{clip-path:inset(0 -4% 0 0);}}
  @media (prefers-reduced-motion:reduce){
    .headline .hl .hl-mark{animation:none;clip-path:inset(0 -4% 0 0);}
    .headline .hl:hover .hl-mark{transform:none;}
  }
  .standfirst{font-size:15.5px;color:var(--ink-soft);padding-top:8px;}
  .standfirst .cta{color:var(--ink);font-weight:600;}
  .stamp{display:block;margin-top:8px;font-size:13px;color:var(--ink-faint);}

  .rule{height:1px;background:var(--line);border:0;margin:34px 0 30px;}

  .sentence{font-size:18px;}
  .srow{display:flex;align-items:baseline;gap:14px;margin-bottom:14px;}
  .srow:last-child{margin-bottom:0;}
  .srow .lead{font-family:var(--serif);font-weight:700;font-size:19px;flex:0 0 116px;text-align:right;color:var(--ink);}
  .pillset{display:flex;flex-wrap:wrap;gap:8px;flex:1;}
  .pill{font-family:var(--sans);font-size:15px;padding:5px 14px;border-radius:999px;border:1px solid var(--line-strong);background:var(--paper);color:var(--ink);cursor:pointer;transition:background .12s,border-color .12s,color .12s;line-height:1.3;white-space:nowrap;}
  .pill:hover{background:var(--surface);}
  .pill:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  .pill.on{background:var(--accent);border-color:var(--accent);color:#fff;}

  .results{display:grid;grid-template-columns:1.2fr 1fr;gap:28px;margin-top:30px;align-items:start;}

  .mapcard{display:flex;flex-direction:column;align-items:center;position:relative;}
  .bigcount{font-family:var(--serif);text-align:center;margin:30px 0 2px;font-size:25px;color:var(--ink);line-height:1.1;}
  .bigcount .bc-num{font-size:46px;font-weight:700;color:var(--accent);margin:0 6px;letter-spacing:-0.01em;}
  .bigcount .bc-suf{color:var(--ink);}
  #grid{width:100%;max-width:640px;height:auto;}
  .legend{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-top:10px;font-size:12px;color:var(--ink-soft);}
  .legend span{display:flex;align-items:center;gap:6px;}
  .swatch{width:11px;height:11px;border-radius:2px;display:inline-block;}

  /* dot hover: grow + recolor (presentation-attribute fill is overridden by these rules) */
  #grid{overflow:visible;}
  .dot{
    transition: fill .14s ease, transform .22s cubic-bezier(.25,.9,.2,1), filter .22s ease;
    cursor: default;
    transform-box: fill-box;
    transform-origin: center;
  }
  .dot:hover{
    fill: var(--grid-hover) !important;
    transform: scale(1.55);
    filter: drop-shadow(0 0 4px rgba(224,163,46,.65));
    z-index: 10;
  }
  /* subtle pop-in when a cell first becomes lit */
  @keyframes dot-pop{
    0%  { transform: scale(.4); opacity:.3; }
    65% { transform: scale(1.25); }
    100%{ transform: scale(1);   opacity:1; }
  }
  .dot-lit{
    cursor: pointer;
    animation: dot-pop .28s cubic-bezier(.2,.8,.2,1) both;
  }
  .dot-lit:hover{
    transform: scale(1.55) !important;
    filter: drop-shadow(0 0 5px rgba(31,90,138,.7));
  }
  @media (prefers-reduced-motion:reduce){
    .dot{ transition: fill .12s ease; }
    .dot:hover, .dot-lit:hover { transform: none; filter: none; }
    .dot-lit { animation: none; }
  }

  .chat{display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 16px 14px;min-height:400px;}
  .chat-eyebrow{font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:12px;}
  .thread{flex:1;display:flex;flex-direction:column;gap:10px;}
  .bubble{max-width:92%;border-radius:10px;padding:10px 13px;font-size:13.5px;line-height:1.55;}
  .bubble.bot{align-self:flex-start;background:var(--paper);border:1px solid var(--line);color:var(--ink);}
  .bubble.bot .em{color:var(--ink);font-weight:600;}
  .bubble.user{align-self:flex-end;background:var(--accent);color:#fff;}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin:14px 0 10px;}
  .chip{font-size:12.5px;padding:6px 12px;border-radius:999px;border:1px solid var(--line-strong);background:var(--paper);color:var(--ink-soft);cursor:pointer;}
  .chip:hover{color:var(--ink);border-color:var(--ink-faint);}
  .chip:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  .composer{display:flex;gap:8px;align-items:center;}
  .composer input{flex:1;height:38px;border:1px solid var(--line-strong);border-radius:8px;padding:0 12px;font-size:14px;font-family:var(--sans);background:var(--paper);color:var(--ink);}
  .composer input:focus{outline:2px solid var(--accent);outline-offset:0;border-color:var(--accent);}
  .composer button{height:38px;width:40px;border:1px solid var(--line-strong);border-radius:8px;background:var(--paper);cursor:pointer;font-size:17px;line-height:1;color:var(--ink);}
  .composer button:hover{background:var(--surface);}
  .composer button:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}

  .footnote{margin-top:30px;font-size:12px;color:var(--ink-faint);line-height:1.6;border-top:1px solid var(--line);padding-top:14px;}

  .loading,.error{padding:40px 0;color:var(--ink-soft);font-size:15px;}
  .error{color:#9a3324;}

  @media (max-width:760px){
    .header{grid-template-columns:1fr;gap:14px;}
    .results{grid-template-columns:1fr;}
    .sentence{font-size:16px;}
    .srow{flex-direction:column;align-items:stretch;gap:8px;}
    .srow .lead{flex:none;text-align:left;}
  }
  @media (prefers-reduced-motion:reduce){
    .pill,.composer button{transition:none;}
  }

  /* ----- incident tooltip ----- */
  #tip{
    position:fixed;z-index:300;display:none;
    min-width:260px;max-width:300px;
    background:#1e1e1c;color:#fff;
    border-radius:10px;padding:14px 16px 13px;
    box-shadow:0 8px 28px rgba(0,0,0,.42);
    pointer-events:none;line-height:1.4;
  }
  .tip-caret{
    position:absolute;top:-7px;
    width:0;height:0;
    border-left:7px solid transparent;
    border-right:7px solid transparent;
    border-bottom:7px solid #1e1e1c;
  }
  .tip-row1{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px;}
  .tip-title{font-weight:700;font-size:14.5px;color:#fff;flex:1;line-height:1.3;}
  .tip-badge{
    flex:0 0 auto;font-size:10.5px;font-weight:700;letter-spacing:.07em;
    padding:3px 9px;border-radius:999px;
    background:#3a3935;color:#e0a32e;
    white-space:nowrap;margin-top:2px;
  }
  .tip-body{font-size:13px;color:#c8c5be;margin-bottom:4px;}
  .tip-meta{font-size:12px;color:#7a776f;margin-bottom:8px;}
  .tip-link{font-size:12.5px;color:#e0a32e;font-weight:600;}
  .dot-lit{cursor:pointer;}
</style>
</head>
<body>
<div class="wrap">

  <header class="header">
    <h1 class="headline" id="headline">Has your content been <span class="hl"><svg class="hl-mark" viewBox="0 0 240 64" preserveAspectRatio="none" aria-hidden="true"><defs><filter id="hlRough" x="-15%" y="-45%" width="130%" height="190%"><feTurbulence type="fractalNoise" baseFrequency="0.02 0.42" numOctaves="2" seed="9" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="10" xChannelSelector="R" yChannelSelector="G"/></filter></defs><g filter="url(#hlRough)" fill="var(--grid-hover)"><path d="M5,13 C60,7 150,9 236,7 C237,26 236,44 234,56 C150,53 70,58 6,55 C4,41 6,27 5,13 Z" opacity="0.82"/><path d="M12,46 C70,41 150,44 228,39" stroke="var(--grid-hover)" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.45"/></g></svg><span class="hl-t">blocked</span></span>?</h1>
    <p class="standfirst" id="standfirst">
      Loading…
    </p>
  </header>

  <hr class="rule" />

  <div id="app" aria-live="polite">
    <p class="loading">Loading the tracker…</p>
  </div>

  <p class="footnote" id="footnote"></p>

</div>

<script>
(function(){
  "use strict";

  // ----- config -----
  // For production, point this at the Azure Blob URL of the vetted daily snapshot.
  var SNAPSHOT_URL = "snapshot.json";  // live data (matches the chat); was sample-snapshot.json
  // For production, point this at your Azure Functions / Foundry chat endpoint.
  // Left null here -> chat runs in stubbed (canned answer) mode.
  // Page is on GitHub Pages; function on Vercel (cross-origin; ask.py uses ALLOW_ORIGIN="*").
  // IMPORTANT: use the NO-HASH production alias so it always serves the latest deploy.
  // The hashed "...-ikqzvx1f5-..." URL is frozen to one old build and will go stale.
  // VERIFY this matches the Production domain in your Vercel project; replace if different.
  var CHAT_ENDPOINT = "https://takedown-tracker-ui.vercel.app/api/ask";

  var SVGNS = "http://www.w3.org/2000/svg";
  var state = { who:null, platform:null, provision:null, sector:null };
  var DATA = null;
  var cellIncidentMap = {};  // key "c_r" -> [incident, ...]
  var tip = null;            // tooltip DOM element

  function el(tag, attrs, kids){
    var n = document.createElement(tag);
    if(attrs) for(var k in attrs){ if(k==="class") n.className=attrs[k]; else if(k==="text") n.textContent=attrs[k]; else n.setAttribute(k,attrs[k]); }
    if(kids) kids.forEach(function(c){ n.appendChild(c); });
    return n;
  }

  function fmt(n){ return Number(n).toLocaleString("en-IN"); }

  // ----- data load -----
  fetch(SNAPSHOT_URL)
    .then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); })
    .then(function(json){ DATA = json; render(); })
    .catch(function(err){
      document.getElementById("app").innerHTML =
        '<p class="error">Couldn\'t load the data. Check the snapshot URL and CORS settings.</p>';
      document.getElementById("standfirst").textContent = "";
      console.error(err);
    });

  function render(){
    var m = DATA.meta;
    document.getElementById("standfirst").innerHTML =
      "Documented incidents of online content being blocked, restricted or taken down in India, "
      + "compiled from public reporting and legal sources. "
      + '<span class="cta">Select the categories below, then ask about the matching incidents.</span>'
      + '<span class="stamp">Last updated ' + formatDate(m.last_updated) + " · " + (m.note || "") + "</span>";

    document.getElementById("footnote").textContent =
      "Each square is one documented incident. \u201CDocumented\u201D counts incidents compiled from public reporting and legal sources; "
      + "\u201Clegal basis identified\u201D counts those where the legal authority for the action is known. "
      + "For most incidents the legal basis is not publicly identified \u2014 the action is visible, the authority for it is not.";

    var app = document.getElementById("app");
    app.innerHTML = "";
    app.appendChild(buildSentence());
    app.appendChild(buildBigCount());
    app.appendChild(buildResults());
    recompute();
  }

  function formatDate(iso){
    if(!iso) return "";
    var d = new Date(iso + "T00:00:00");
    return d.toLocaleDateString("en-GB", { day:"numeric", month:"long", year:"numeric" });
  }

  // ----- compose-a-sentence -----
  function buildSentence(){
    var box = el("div", { class:"sentence" });

    function set(group){
      var span = el("span", { class:"pillset" });
      DATA.facets[group].forEach(function(opt){
        var b = el("button", { class:"pill", type:"button", "data-v":opt.id, text:opt.label });
        b.addEventListener("click", function(){
          var was = b.classList.contains("on");
          span.querySelectorAll(".pill").forEach(function(x){ x.classList.remove("on"); });
          state[group] = was ? null : opt.id;
          if(!was) b.classList.add("on");
          recompute();
        });
        span.appendChild(b);
      });
      return span;
    }

    function row(leadText, group){
      var r = el("div", { class:"srow" });
      r.appendChild(el("span", { class:"lead", text:leadText }));
      r.appendChild(set(group));
      return r;
    }

    box.appendChild(row("If you are", "who"));
    box.appendChild(row("on", "platform"));
    box.appendChild(row("blocked under", "provision"));
    box.appendChild(row("in", "sector"));
    return box;
  }

  // ----- results: map + chat -----
  var squares = [];
  function buildResults(){
    var grid = el("div", { class:"results" });

    // map column
    var mapcard = el("div", { class:"mapcard" });

    var svg = document.createElementNS(SVGNS, "svg");
    svg.setAttribute("id","grid");
    svg.setAttribute("viewBox","0 0 360 320");
    svg.setAttribute("role","img");
    svg.setAttribute("aria-label","Tile map of India. Grey cells form the country; highlighted cells mark where matching incidents originate.");
    mapcard.appendChild(svg);

    var legend = el("div", { class:"legend" });
    legend.innerHTML =
      '<span><span class="swatch" style="background:var(--grid-empty)"></span>India</span>'
      + '<span><span class="swatch" style="background:var(--grid-match)"></span>Your matches</span>';
    mapcard.appendChild(legend);

    grid.appendChild(mapcard);

    // chat column
    var chat = el("div", { class:"chat" });
    chat.appendChild(el("div", { class:"chat-eyebrow", id:"chatEyebrow", text:"Ask about the matching incidents" }));
    var thread = el("div", { class:"thread", id:"thread" });
    chat.appendChild(thread);

    var chips = el("div", { class:"chips", id:"chips" });
    ["Which were challenged in court?","Show the most recent","How many have a known legal basis?","Which platforms are affected?"].forEach(function(q){
      var c = el("button", { class:"chip", type:"button", text:q });
      c.addEventListener("click", function(){ ask(q); });
      chips.appendChild(c);
    });
    chat.appendChild(chips);

    var composer = el("div", { class:"composer" });
    var input = el("input", { type:"text", id:"qbox", placeholder:"Ask a follow-up\u2026", "aria-label":"Ask a follow-up question" });
    var send = el("button", { type:"button", id:"send", "aria-label":"Send", text:"\u2191" });
    function fire(){ var v=input.value.trim(); if(!v) return; ask(v); input.value=""; }
    send.addEventListener("click", fire);
    input.addEventListener("keydown", function(e){ if(e.key==="Enter") fire(); });
    composer.appendChild(input); composer.appendChild(send);
    chat.appendChild(composer);

    grid.appendChild(chat);

    buildGrid(svg);
    buildTooltip();
    return grid;
  }

    [7,25], [8,25], [9,25], [10,25], [11,25], [12,25], [13,25], [14,25], [15,25], [16,25],
    [17,25], [18,25], [19,25], [20,25], [21,25], [22,25], [23,25], [24,25], [25,25], [26,25],
    [27,25], [28,25], [29,25], [30,25], [4,26], [5,26], [6,26], [8,26], [9,26], [10,26],
    [11,26], [12,26], [13,26], [14,26], [15,26], [16,26], [17,26], [18,26], [19,26], [20,26],
    [21,26], [22,26], [23,26], [24,26], [25,26], [26,26], [27,26], [8,27], [9,27], [10,27],
    [11,27], [12,27], [13,27], [14,27], [15,27], [16,27], [17,27], [18,27], [19,27], [20,27],
    [21,27], [22,27], [23,27], [24,27], [25,27], [26,27], [27,27], [7,28], [8,28], [9,28],
    [10,28], [11,28], [12,28], [13,28], [14,28], [15,28], [16,28], [17,28], [18,28], [19,28],
    [20,28], [21,28], [22,28], [23,28], [24,28], [25,28], [26,28], [8,29], [9,29], [10,29],

    [8,31], [9,31], [10,31], [11,31], [12,31], [13,31], [14,31], [15,31], [16,31], [17,31],
    [18,31], [19,31], [20,31], [21,31], [22,31], [8,32], [9,32], [10,32], [11,32], [12,32],
    [13,32], [14,32], [15,32], [16,32], [17,32], [18,32], [19,32], [20,32], [21,32], [8,33],
    [9,33], [10,33], [11,33], [12,33], [13,33], [14,33], [15,33], [16,33], [17,33], [18,33],
    [19,33], [20,33], [9,34], [10,34], [11,34], [12,34], [13,34], [14,34], [15,34], [16,34],
    [17,34], [18,34], [19,34], [9,35], [10,35], [11,35], [12,35], [13,35], [14,35], [15,35],
    [16,35], [17,35], [9,36], [10,36], [11,36], [12,36], [13,36], [14,36], [15,36], [16,36],
    [17,36], [10,37], [11,37], [12,37], [13,37], [14,37], [15,37], [16,37], [17,37], [10,38],
    [11,38], [12,38], [13,38], [14,38], [15,38], [16,38], [17,38], [10,39], [11,39], [12,39],
    [13,39], [14,39], [15,39], [16,39], [17,39], [11,40], [12,40], [13,40], [14,40], [15,40],
    [16,40], [17,40], [36,40], [11,41], [12,41], [13,41], [14,41], [15,41], [16,41], [17,41],
    [12,42], [13,42], [14,42], [15,42], [16,42], [17,42], [12,43], [13,43], [14,43], [15,43],
    [16,43], [17,43], [13,44], [14,44], [15,44], [16,44], [13,45], [14,45], [15,45], [16,45],
    [13,46], [14,46]
  ];

  // Grid parameters: lon/lat bounding box and cell resolution.
  // These must stay in sync with INDIA_CELLS (cells were computed with these values).
  var GEO = { lonMin:67.5, lonMax:98.0, latMin:6.5, latMax:37.8, cols:44, rows:50 };
  var landSet = {};   // "c_r" -> true
  var cellRect = {};  // "c_r" -> rect

  function cellCenter(c, r){
    return [ GEO.lonMin + (c+0.5)*(GEO.lonMax-GEO.lonMin)/GEO.cols,
             GEO.latMax - (r+0.5)*(GEO.latMax-GEO.latMin)/GEO.rows ];
  }
  function lonLatToCell(lon, lat){
    var c = Math.floor((lon-GEO.lonMin)/((GEO.lonMax-GEO.lonMin)/GEO.cols));
    var r = Math.floor((GEO.latMax-lat)/((GEO.latMax-GEO.latMin)/GEO.rows));
    return [Math.max(0,Math.min(GEO.cols-1,c)), Math.max(0,Math.min(GEO.rows-1,r))];
  }
  function nearestLandCell(c, r){
    if(landSet[c+"_"+r]) return c+"_"+r;
    for(var rad=1; rad<=Math.max(GEO.cols,GEO.rows); rad++){
      for(var dr=-rad; dr<=rad; dr++){
        for(var dc=-rad; dc<=rad; dc++){
          if(Math.abs(dr)!==rad && Math.abs(dc)!==rad) continue;  // ring only
          var k=(c+dc)+"_"+(r+dr);
          if(landSet[k]) return k;
        }
      }
    }
    return null;
  }

  // City coordinates used for state capitals and High-Court seats.
  var CITY = {
    "New Delhi":[77.21,28.61], "Bengaluru":[77.59,12.97], "Mumbai":[72.88,19.08],
    "Chennai":[80.27,13.08], "Kolkata":[88.36,22.57], "Ahmedabad":[72.57,23.03],
    "Jaipur":[75.79,26.91], "Jodhpur":[73.02,26.29], "Hyderabad":[78.47,17.38],
    "Lucknow":[80.95,26.85], "Patna":[85.14,25.59], "Bhopal":[77.41,23.26],
    "Thiruvananthapuram":[76.95,8.52], "Guwahati":[91.74,26.14], "Chandigarh":[76.78,30.73]
  };
  // High Court / issuing-body -> city (extend as needed).
  var COURT_CITY = {
    "Delhi High Court":"New Delhi", "High Court":"New Delhi",
    "Karnataka High Court":"Bengaluru", "Karnataka HC":"Bengaluru",
    "Bombay High Court":"Mumbai", "Bombay HC":"Mumbai",
    "Gujarat High Court":"Ahmedabad", "Rajasthan High Court":"Jodhpur",
    "Madras High Court":"Chennai", "Calcutta High Court":"Kolkata"
  };

  // Resolve an incident to [lon,lat]. Reads explicit geo if the data ever carries
  // it (o.lon/o.lat, o.city, o.state capital, o.court seat); otherwise falls back
  // to the central issuing body for Section 69A / 79(3)(b) / Sahyog orders (Delhi).
  function incidentLonLat(o){
    if(o.lon != null && o.lat != null) return [o.lon, o.lat];
    if(o.city && CITY[o.city]) return CITY[o.city];
    if(o.state && CITY[o.state]) return CITY[o.state];
    if(o.court && COURT_CITY[o.court] && CITY[COURT_CITY[o.court]]) return CITY[COURT_CITY[o.court]];
    return CITY["New Delhi"];
  }

  // Cells to light for a set of matching incidents: the resolved cell at full
  // intensity, with a gradual radial falloff across surrounding land cells so
  // the highlight reads as a soft gradient rather than a hard block.
  var HALO_RADIUS = 2;                 // how many rings spread out from a hit
  // intensity by Chebyshev distance from the nearest incident centre (0..1)
  function haloFalloff(dist){
    if(dist <= 0) return 1;
    if(dist >= HALO_RADIUS + 1) return 0;
    return Math.max(0, 1 - dist / (HALO_RADIUS + 1));
  }
  function matchedCellKeys(matched){
    var keys = {};                     // "c_r" -> intensity 0..1 (max across hits)
    (matched || []).forEach(function(o){
      var ll = incidentLonLat(o);
      var cr = lonLatToCell(ll[0], ll[1]);
      var k = nearestLandCell(cr[0], cr[1]);
      if(!k) return;
      var p = k.split("_"), cc = +p[0], rr = +p[1];
      for(var dc = -HALO_RADIUS; dc <= HALO_RADIUS; dc++){
        for(var dr = -HALO_RADIUS; dr <= HALO_RADIUS; dr++){
          var nk = (cc+dc)+"_"+(rr+dr);
          if(!landSet[nk]) continue;
          var dist = Math.max(Math.abs(dc), Math.abs(dr));
          var v = haloFalloff(dist);
          if(v > (keys[nk] || 0)) keys[nk] = v;
        }
      }
    });
    return keys;
  }

  // interpolate between the grid-empty grey and the match blue by intensity t
  var GRID_EMPTY_RGB = [217,213,203];  // #d9d5cb
  var GRID_MATCH_RGB = [31,90,138];    // #1f5a8a
  function haloColor(t){
    t = Math.max(0, Math.min(1, t));
    var r = Math.round(GRID_EMPTY_RGB[0] + (GRID_MATCH_RGB[0]-GRID_EMPTY_RGB[0])*t);
    var g = Math.round(GRID_EMPTY_RGB[1] + (GRID_MATCH_RGB[1]-GRID_EMPTY_RGB[1])*t);
    var b = Math.round(GRID_EMPTY_RGB[2] + (GRID_MATCH_RGB[2]-GRID_EMPTY_RGB[2])*t);
    return "rgb(" + r + "," + g + "," + b + ")";
  }

  function buildGrid(svg){          // builds the India tile map
    squares = []; landSet = {}; cellRect = {};
    var pitch = 24, inset = 2.5, sz = pitch - inset*2;
    INDIA_CELLS.forEach(function(cr){
      var c = cr[0], r = cr[1];
      var key = c+"_"+r;
      landSet[key] = true;
      var rect = document.createElementNS(SVGNS, "rect");
      rect.setAttribute("x", c*pitch + inset);
      rect.setAttribute("y", r*pitch + inset);
      rect.setAttribute("width", sz); rect.setAttribute("height", sz); rect.setAttribute("rx", "3");
      rect.setAttribute("fill", "var(--grid-empty)");
      rect.setAttribute("class", "dot");
      rect.dataset.cell = key;
      // tooltip on hover for lit cells
      rect.addEventListener("mouseover", function(){
        var incidents = cellIncidentMap[this.dataset.cell];
        if(incidents && incidents.length) showTip(this, incidents);
      });
      rect.addEventListener("mouseout", hideTip);
      // click lit cell → open source
      rect.addEventListener("click", function(){
        var incidents = cellIncidentMap[this.dataset.cell];
        if(!incidents || !incidents.length) return;
        var url = incidents[0].url || incidents[0].source || incidents[0].link || "";
        if(url) window.open(url, "_blank", "noopener,noreferrer");
      });
      svg.appendChild(rect); squares.push(rect); cellRect[key] = rect;
    });
    svg.setAttribute("viewBox", "0 0 " + (GEO.cols*pitch) + " " + (GEO.rows*pitch));
  }

  // ----- tooltip helpers -----
  function buildTooltip(){
    tip = document.createElement("div");
    tip.id = "tip";
    document.body.appendChild(tip);
  }

  function escHtml(s){
    return String(s || "")
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function showTip(rectEl, incidents){
    if(!tip) return;
    var o = incidents[0];
    var title  = o.title || o.entity || o.name || o.description || "";
    var status = o.status || (o.disclosed ? "Active" : "Unknown");
    var desc   = (o.description && o.description !== title) ? o.description : (o.action || "");
    var parts  = [o.platform, o.sector || o.category, o.date].filter(Boolean);
    var meta   = parts.join(" \u00B7 ");
    var url    = o.url || o.source || o.link || "";

    tip.innerHTML =
      '<div class="tip-caret"></div>'
      + '<div class="tip-row1">'
      +   '<span class="tip-title">' + escHtml(title) + '</span>'
      +   '<span class="tip-badge">' + escHtml(status.toUpperCase()) + '</span>'
      + '</div>'
      + (desc   ? '<div class="tip-body">'  + escHtml(desc) + '</div>' : '')
      + (meta   ? '<div class="tip-meta">'  + escHtml(meta) + '</div>' : '')
      + (url    ? '<div class="tip-link">click to open source \u2197</div>' : '');

    tip.style.display = "block";

    // Position centered below the hovered cell, clamped to viewport
    var bcr = rectEl.getBoundingClientRect();
    var tw  = tip.offsetWidth  || 280;
    var cellMid = bcr.left + bcr.width / 2;
    var x = Math.max(8, Math.min(cellMid - tw / 2, window.innerWidth - tw - 8));
    var y = bcr.bottom + 8;

    tip.style.left = x + "px";
    tip.style.top  = y + "px";

    // Align caret under cell centre
    var caret = tip.querySelector(".tip-caret");
    if(caret) caret.style.left = (cellMid - x - 7) + "px";
  }

  function hideTip(){
    if(tip) tip.style.display = "none";
  }


  // The grid groups by platform (the inner key of the matrix).
  function gridGroups(){
    return DATA.facets.platform || [];
  }

  // total documented per platform = sum across provisions in the matrix
  function matrixTotalFor(platformId){
    var t = 0;
    for(var prov in DATA.matrix){
      if(prov.charAt(0)==="_") continue;
      var cell = DATA.matrix[prov][platformId];
      if(cell) t += cell.documented;
    }
    return t;
  }

  // ----- live "There are N…" count (updates on every toggle, partial or full) -----
  function buildBigCount(){
    var d = el("div", { class:"bigcount", id:"bigcount" });
    d.innerHTML = '<span class="bc-pre">There are</span>'
      + '<span class="bc-num" id="bcNum">0</span>'
      + '<span class="bc-suf" id="bcSuf">documented incidents on record</span>';
    return d;
  }

  function partialCount(){
    return (DATA.orders || []).filter(function(o){
      return (!state.who      || matchField(o, "who", state.who))
          && (!state.platform  || matchField(o, "platform", state.platform))
          && (!state.provision || matchField(o, "provision", state.provision))
          && (!state.sector    || matchField(o, "sector", state.sector));
    }).length;
  }

  function tweenNum(node, to){
    var from = parseInt((node.textContent || "0").replace(/[^0-9]/g, ""), 10) || 0;
    if(from === to){ node.textContent = to; return; }
    var start = null, dur = 360;
    function step(ts){
      if(start === null) start = ts;
      var p = Math.min(1, (ts - start) / dur);
      var e = p < 0.5 ? 2*p*p : 1 - Math.pow(-2*p + 2, 2)/2;
      node.textContent = Math.round(from + (to - from) * e);
      if(p < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  function updateBigCount(){
    var num = document.getElementById("bcNum");
    if(!num) return;
    var suf = document.getElementById("bcSuf");
    var any = state.who || state.platform || state.provision || state.sector;
    var n = any ? partialCount() : ((DATA.orders || []).length);
    tweenNum(num, n);
    if(suf) suf.textContent = any ? "documented incidents like this" : "documented incidents on record";
  }

  // ----- recompute on selection -----
  function recompute(){
    updateBigCount();
    var ready = state.who && state.platform && state.provision && state.sector;
    var eyebrow = document.getElementById("chatEyebrow");

    if(!ready){
      cellIncidentMap = {};
      squares.forEach(function(r){
        r.setAttribute("fill","var(--grid-empty)");
        r.classList.remove("dot-lit");
      });
      hideTip();
      if(eyebrow) eyebrow.textContent = "Ask about the matching incidents";
      resetThread(null);
      return;
    }

    var counts = countMatches();

    // Build cell → incidents map (primary cell only, before halo expansion)
    cellIncidentMap = {};
    (counts.matched || []).forEach(function(o){
      var ll = incidentLonLat(o);
      var cr = lonLatToCell(ll[0], ll[1]);
      var k = nearestLandCell(cr[0], cr[1]);
      if(!k) return;
      if(!cellIncidentMap[k]) cellIncidentMap[k] = [];
      cellIncidentMap[k].push(o);
    });

    // light the map cells where the matching incidents originate
    var keys = matchedCellKeys(counts.matched || []);
    var litCount = 0;
    squares.forEach(function(r){
      var t = keys[r.dataset.cell] || 0;
      var lit = t > 0;
      var primary = !!cellIncidentMap[r.dataset.cell];
      // primary cells stay full match-blue; halo cells fade by intensity
      r.setAttribute("fill", primary ? "var(--grid-match)"
                                     : (lit ? haloColor(t) : "var(--grid-empty)"));
      if(primary){
        // stagger pop-in by up to 180 ms so cells ripple in rather than all at once
        r.style.animationDelay = (litCount * 18).toFixed(0) + "ms";
        r.classList.add("dot-lit");
        litCount++;
      } else {
        r.style.animationDelay = "";
        r.classList.remove("dot-lit");
      }
    });

    if(eyebrow) eyebrow.textContent = "Ask about these " + counts.documented + " incidents";
    resetThread(counts);
  }

  // Count logic: read real numbers.
  // The matrix (provision x platform) gives provision-level totals and the
  // per-platform distribution for the grid. The headline count filters the
  // order records on every selected facet.
  function countMatches(){
    var prov = DATA.matrix[state.provision] || {};
    var provisionTotal = 0, provisionDisclosed = 0;
    for(var p in prov){ provisionTotal += prov[p].documented; provisionDisclosed += prov[p].disclosed; }

    var matched = (DATA.orders || []).filter(function(o){
      return o.provision === state.provision
          && o.platform === state.platform
          && matchField(o, "who", state.who)
          && matchField(o, "sector", state.sector);
    });

    var useOrders = matched.length > 0 || (DATA.meta && DATA.meta.orders_complete);
    var documented = useOrders ? matched.length : provisionTotal;
    var disclosed = useOrders
      ? matched.filter(function(o){ return o.disclosed; }).length
      : provisionDisclosed;

    // "disclosed" here means legal basis is identified; an Unknown basis is
    // never an identified basis.
    if(state.provision === "Unknown") disclosed = 0;

    return { documented:documented, disclosed:disclosed, provisionTotal:provisionTotal, matched:matched };
  }

  // If a record lacks a field, don't exclude on it.
  function matchField(o, key, val){
    if(o[key] === undefined || o[key] === null) return true;
    return o[key] === val;
  }

  // ----- chat -----
  function resetThread(counts){
    var thread = document.getElementById("thread");
    if(!thread) return;
    thread.innerHTML = "";
    var b = el("div", { class:"bubble bot" });
    if(!counts){
      b.textContent = "Compose your situation above, then ask me about the incidents that match.";
    } else {
      var labels = selectionLabels();
      b.innerHTML = "You're looking at <span class=\"em\">" + counts.documented + " documented incidents</span> involving "
        + labels.who + " on " + labels.platform + ", under " + labels.provision
        + ". Ask me anything about them.";
    }
    thread.appendChild(b);
  }

  function selectionLabels(){
    function lbl(group,id){ var a=DATA.facets[group]; for(var i=0;i<a.length;i++) if(a[i].id===id) return a[i].label; return id; }
    return {
      who: lbl("who", state.who),
      platform: lbl("platform", state.platform),
      provision: lbl("provision", state.provision),
      sector: lbl("sector", state.sector)
    };
  }

  function addBubble(role, text){
    var thread = document.getElementById("thread");
    var b = el("div", { class:"bubble " + role });
    b.textContent = text;
    thread.appendChild(b);
    b.scrollIntoView({ block:"nearest" });
  }

  function ask(question){
    if(!(state.who && state.platform && state.provision && state.sector)){
      addBubble("bot", "Pick an option in each row first, so I can scope the answer to the matching incidents.");
      return;
    }
    addBubble("user", question);
    if(CHAT_ENDPOINT){
      liveAsk(question);
    } else {
      setTimeout(function(){ addBubble("bot", cannedAnswer(question)); }, 220);
    }
  }

  function cannedAnswer(q){
    var labels = selectionLabels();
    var key = q.toLowerCase();
    if(key.indexOf("challenge")>-1 || key.indexOf("court")>-1)
      return "Challenges to incidents like these have been filed mainly in the Delhi, Karnataka and Bombay High Courts. In live mode this returns the matching legal cases.";
    if(key.indexOf("recent")>-1)
      return "The most recent matching incident would appear here with its date, the entity affected, and a source link.";
    if(key.indexOf("basis")>-1 || key.indexOf("provision")>-1 || key.indexOf("why")>-1)
      return "You've filtered to \u201C" + labels.provision + ".\u201D Note that for most documented incidents the legal basis is recorded as \u201CUnknown\u201D \u2014 the action is visible but the legal authority for it was never made public. That gap is itself a finding.";
    if(key.indexOf("platform")>-1)
      return "Incidents are grouped by platform in the panel on the left. The large majority involve Twitter/X.";
    return "For many incidents that detail isn't recorded in the public sources \u2014 in live mode I'd answer from the incident records and link to the source reporting.";
  }

  function liveAsk(question){
    var payload = { question: question, filter: { who:state.who, platform:state.platform, provision:state.provision, sector:state.sector } };
    fetch(CHAT_ENDPOINT, { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify(payload) })
      .then(function(r){ return r.json(); })
      .then(function(res){ addBubble("bot", res.answer || "No answer returned."); })
      .catch(function(){ addBubble("bot", "The assistant is unavailable right now. Try again shortly."); });
  }

})();
